<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HUD | Command Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="author" content="" />

    <!-- ================== BEGIN core-css ================== -->
    <link href="../../../../../static/assets/css/vendor.min.css" rel="stylesheet" />
    <link href="../../../../../static/assets/css/app.min.css" rel="stylesheet" />
    <!-- ================== END core-css ================== -->
    <link
    rel="stylesheet"
    href="../../../../../static/assets/css/device.details.css"
  />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css"
  />
	{% block extra_css %} {% endblock %}
  </head>
  <body>
    <!-- BEGIN #app -->
    <div id="app" class="app">
		
      {% include 'components/header.html' %}
      {% include 'components/commands/sidebar.html' %}

      <!-- BEGIN #content -->
      <div id="content" class="app-content">
        {% block content %} {% endblock %}
      </div>
      <!-- END #content -->

      <!-- BEGIN btn-scroll-top -->
      <a href="#" data-toggle="scroll-to-top" class="btn-scroll-top fade"
        ><i class="fa fa-arrow-up"></i
      ></a>
      <!-- END btn-scroll-top -->
    </div>
    <!-- END #app -->

    <script src="../../../../../static/assets/js/vendor.min.js"></script>
    <script src="../../../../../static/assets/js/app.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.location.pathname.split("/")[3] === undefined) {
          document.querySelectorAll(".command-link").forEach((link) => {
            const command = link.dataset.command;
            const deviceId = window.location.pathname.split("/")[2];
            if (command) {
              link.href = `${deviceId}/commands/${command}`;
            }
          });
        }
      });
    </script>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    {% block extra_js %} {% endblock %} 

    {% if alert %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            toastr.options = {
                closeButton: false,
                debug: false,
                newestOnTop: true,
                progressBar: true,
                positionClass: "toast-top-right",
                preventDuplicates: false,
                onclick: null,
                showDuration: "300",
                hideDuration: "1000",
                timeOut: "5000",
                extendedTimeOut: "1000",
                showEasing: "swing",
                hideEasing: "linear",
                showMethod: "fadeIn",
                hideMethod: "fadeOut",
            };

            toastr["{{ alert['status'] }}"](
                "{{ alert['message'] }}",
                "{{ alert['title'] }}"
            );
        });
    </script>
    {% endif %}

  </body>
</html>

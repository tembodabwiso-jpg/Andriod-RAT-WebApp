<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HUD | Commands Execution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="author" content="" />

    <link
      href="../../../../../static/assets/css/vendor.min.css"
      rel="stylesheet"
    />
    <link
      href="../../../../../static/assets/css/app.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="../../../../../static/assets/css/device.details.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css"
    />
    {% block extra_css %} {% endblock %}
  </head>
  <body class="pace-top">
    <div id="app" class="app app-without-sidebar app-without-header">
      <div id="content" class="app-content p-1 ps-xl-4 pe-xl-4 pt-xl-3 pb-xl-3">
        <div class="pos card" id="pos">
          <div class="pos-container card-body">
            <div class="pos-menu">
              <div class="logo">
                <a
                  href="/devices"
                  class="d-flex align-items-center text-decoration-none"
                >
                  <i class="bi bi-arrow-left"></i>
                  <span>Back to Devices</span>
                </a>
              </div>
              {% include 'components/commands/sidebar.html' %}
            </div>

            <div class="pos-content">{% block content %} {% endblock %}</div>
          </div>
          <div class="card-arrow">
            <div class="card-arrow-top-left"></div>
            <div class="card-arrow-top-right"></div>
            <div class="card-arrow-bottom-left"></div>
            <div class="card-arrow-bottom-right"></div>
          </div>
        </div>
      </div>

      <a href="#" data-toggle="scroll-to-top" class="btn-scroll-top fade">
        <i class="fa fa-arrow-up"></i>
      </a>
    </div>

    <script src="../../../../../static/assets/js/vendor.min.js"></script>
    <script src="../../../../../static/assets/js/app.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.location.pathname.split("/")[3] === undefined) {
          document.querySelectorAll(".command-link").forEach((link) => {
            const command = link.dataset.command;
            const deviceId = window.location.pathname.split("/")[2];
            if (command) {
              link.href = `${deviceId}/commands/${command}`;
            }
          });
        }
      });
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    {% block extra_js %} {% endblock %} 
    
    {% if alert %}
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        toastr.options = {
          closeButton: false,
          debug: false,
          newestOnTop: true,
          progressBar: true,
          positionClass: "toast-top-right",
          preventDuplicates: false,
          onclick: null,
          showDuration: "300",
          hideDuration: "1000",
          timeOut: "5000",
          extendedTimeOut: "1000",
          showEasing: "swing",
          hideEasing: "linear",
          showMethod: "fadeIn",
          hideMethod: "fadeOut",
        };

        toastr["{{ alert['status'] }}"](
          "{{ alert['message'] }}",
          "{{ alert['title'] }}"
        );
      });
    </script>
    {% endif %}
  </body>
</html>
